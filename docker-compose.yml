services:
  jekyll:
    image: jekyll/jekyll:latest
    command: sh -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --incremental --trace --config _config.yml,_config.local.yml"
    ports:
      - 4000:4000
    volumes:
      - .:/srv/jekyll

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ENABLE_CORS=true

  adr-embeddings:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    profiles:
      - tools
