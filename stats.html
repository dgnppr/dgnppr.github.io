---
layout: default
title: Writing Stats
permalink: /stats/
---

<style>
  .stats-container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
    color: var(--color-text-primary);
  }

  .stats-header {
    margin-bottom: 40px;
  }

  .stats-header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    color: var(--color-text-heading);
  }

  .stats-header p {
    font-size: 1rem;
    color: var(--color-text-secondary);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    transition: background-color 0.2s, border-color 0.2s;
  }

  .stat-card:hover {
    background: var(--color-surface-hover);
  }

  .stat-card h3 {
    font-size: 0.85rem;
    color: var(--color-text-secondary);
    margin: 0 0 10px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .stat-card .value {
    font-size: 2.5rem;
    font-weight: bold;
    color: var(--color-text-primary);
    margin: 0;
  }

  .stat-card .subtext {
    font-size: 0.85rem;
    color: var(--color-text-secondary);
    margin-top: 8px;
  }

  .section {
    margin-bottom: 50px;
  }

  .section h2 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: var(--color-text-heading);
    border-bottom: 1px solid var(--color-border);
    padding-bottom: 10px;
  }

  .filter-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 16px;
    border: 1px solid var(--color-border);
    background: var(--color-surface-muted);
    color: var(--color-text-primary);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    background: rgba(147, 197, 253, 0.1);
  }

  .filter-btn.active {
    background: #93c5fd;
    color: white;
    border-color: #93c5fd;
  }

  .chart-container {
    position: relative;
    height: 400px;
    margin: 20px 0;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 20px;
  }

  .category-list {
    list-style: none;
    padding: 0;
  }

  .category-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--color-border-subtle);
  }

  .category-list .cat-name {
    font-weight: 500;
    color: var(--color-text-primary);
  }

  .category-list .cat-count {
    background: var(--color-tag-bg);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    color: var(--color-tag-text);
    border: 1px solid var(--color-tag-border);
  }

  .status-list {
    list-style: none;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
  }

  .status-list li {
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    padding: 15px;
    text-align: center;
  }

  .status-list .status-name {
    font-weight: 600;
    color: var(--color-text-primary);
    margin-bottom: 8px;
    font-size: 0.95rem;
  }

  .status-list .status-count {
    font-size: 1.8rem;
    font-weight: bold;
    color: var(--color-text-primary);
  }

  .category-link {
    color: var(--color-text-primary);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .category-link:hover {
    color: var(--color-brand);
    text-decoration: underline;
  }
</style>

<div class="stats-container">
  <div class="stats-header">
    <h1>Writing Stats</h1>
    <p>포스트 작성 패턴과 통계</p>
  </div>

  <!-- 요약 통계 -->
  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Posts</h3>
      <p class="value" id="total-posts">0</p>
      <p class="subtext">published posts</p>
    </div>
    <div class="stat-card">
      <h3>Complete</h3>
      <p class="value" id="status-complete">0</p>
      <p class="subtext">fully written</p>
    </div>
    <div class="stat-card">
      <h3>Active Categories</h3>
      <p class="value" id="category-count">0</p>
      <p class="subtext">topics covered</p>
    </div>
    <div class="stat-card">
      <h3>Latest Month</h3>
      <p class="value" id="latest-month-count">0</p>
      <p class="subtext" id="latest-month-label">-</p>
    </div>
  </div>

  <!-- 월별 작성 현황 -->
  <div class="section">
    <h2>Monthly Writing Pace</h2>

    <div class="filter-controls">
      <button class="filter-btn" data-range="3">최근 3개월</button>
      <button class="filter-btn" data-range="6">최근 6개월</button>
      <button class="filter-btn" data-range="12">최근 1년</button>
      <button class="filter-btn active" data-range="0">전체</button>
    </div>

    <div class="chart-container">
      <canvas id="monthly-chart"></canvas>
    </div>
  </div>

  <!-- 상태별 분포 -->
  <div class="section">
    <h2>Post Status Distribution</h2>
    <ul class="status-list" id="status-stats"></ul>
  </div>

  <!-- 카테고리별 분포 -->
  <div class="section">
    <h2>By Category</h2>
    <ul class="category-list" id="category-stats"></ul>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  let monthlyChart = null;
  let allData = null;
  let currentRange = 0;

  const STATUS_CONFIG = {
    'complete': { label: 'Complete', color: '#93c5fd' },
    'needs-update': { label: 'Needs Update', color: '#ea580c' },
    'deepen': { label: 'Deepen', color: '#93c5fd' },
    'wip': { label: 'Work in Progress', color: '#9333ea' },
    'draft': { label: 'Draft', color: '#64748b' },
    'unknown': { label: 'Unknown', color: '#8A93A5' }
  };

  // 통계 데이터 로드
  fetch('/data/writing-stats.json')
    .then(response => response.json())
    .then(data => {
      allData = data;
      renderStats(data);
    })
    .catch(error => console.error('Failed to load stats:', error));

  function renderStats(data) {
    // 요약 통계
    document.getElementById('total-posts').textContent = data.total;
    document.getElementById('status-complete').textContent = data.byStatus.complete || 0;
    document.getElementById('category-count').textContent = Object.keys(data.byCategory).length;

    // 최신 월 정보
    const months = Object.keys(data.byMonth);
    if (months.length > 0) {
      const latestMonth = months[0];
      const latestData = data.byMonth[latestMonth];
      document.getElementById('latest-month-count').textContent = latestData.count;
      document.getElementById('latest-month-label').textContent = formatMonth(latestMonth);
    }

    // 월별 시계열 차트 렌더링
    renderMonthlyChart(data.byMonth, currentRange);

    // 상태별 통계 렌더링
    const statusEntries = Object.entries(data.byStatus).sort((a, b) => b[1] - a[1]);
    const statusHtml = statusEntries.map(([status, count]) => {
      const config = STATUS_CONFIG[status] || STATUS_CONFIG['unknown'];
      return `
        <li>
          <div class="status-name">${config.label}</div>
          <div class="status-count">${count}</div>
        </li>
      `;
    }).join('');
    document.getElementById('status-stats').innerHTML = statusHtml;

    // 카테고리별 통계 렌더링 (내림차순)
    const categoryEntries = Object.entries(data.byCategory).sort((a, b) => b[1] - a[1]);
    const categoryHtml = categoryEntries.map(([category, count]) => {
      return `
        <li>
          <a href="/tags/#${category}" class="cat-name category-link">${capitalize(category)}</a>
          <span class="cat-count">${count}</span>
        </li>
      `;
    }).join('');
    document.getElementById('category-stats').innerHTML = categoryHtml;
  }

  function getFilteredMonths(byMonth, rangeMonths) {
    const now = new Date();
    const allMonths = Object.keys(byMonth).sort();

    // 전체 데이터의 시간 범위 계산
    let startDate, endDate;

    if (rangeMonths > 0) {
      // 최근 N개월
      startDate = new Date(now.getFullYear(), now.getMonth() - rangeMonths + 1, 1);
      endDate = now;
    } else {
      // 전체: 첫 번째 데이터부터 현재까지
      if (allMonths.length > 0) {
        const [firstYear, firstMonth] = allMonths[0].split('-');
        startDate = new Date(firstYear, parseInt(firstMonth) - 1, 1);
      } else {
        startDate = new Date(now.getFullYear(), now.getMonth(), 1);
      }
      endDate = now;
    }

    // 모든 월을 채우기 (데이터가 없는 월도 0으로)
    const filledMonths = {};
    const monthCount = (endDate.getFullYear() - startDate.getFullYear()) * 12 +
                       (endDate.getMonth() - startDate.getMonth()) + 1;

    for (let i = 0; i < monthCount; i++) {
      const d = new Date(startDate.getFullYear(), startDate.getMonth() + i, 1);
      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      filledMonths[key] = byMonth[key] || { count: 0, posts: [] };
    }

    return Object.entries(filledMonths).sort((a, b) => a[0].localeCompare(b[0]));
  }

  function renderMonthlyChart(byMonth, rangeMonths) {
    const isDark = document.documentElement.classList.contains('dark-mode');

    const textColor = isDark ? '#C8CDD5' : 'rgba(0, 0, 0, 0.84)';
    const gridColor = isDark ? '#636e72' : '#d0d0d0';
    const lineColor = '#93c5fd';
    const fillColor = isDark ? 'rgba(147, 197, 253, 0.1)' : 'rgba(147, 197, 253, 0.05)';

    const filteredMonths = getFilteredMonths(byMonth, rangeMonths);
    const labels = filteredMonths.map(([m, _]) => formatMonth(m));
    const counts = filteredMonths.map(([_, data]) => data.count);

    const ctx = document.getElementById('monthly-chart').getContext('2d');

    if (monthlyChart) {
      monthlyChart.destroy();
    }

    monthlyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Posts per Month',
          data: counts,
          borderColor: lineColor,
          backgroundColor: fillColor,
          borderWidth: 2.5,
          fill: true,
          tension: 0.4,
          pointBackgroundColor: lineColor,
          pointBorderColor: isDark ? '#1E1F22' : '#FFFFFF',
          pointBorderWidth: 2,
          pointRadius: 5,
          pointHoverRadius: 7
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            onClick: null,
            labels: {
              color: textColor,
              font: { size: 14, family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' },
              padding: 15
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              color: textColor,
              stepSize: 1,
              font: { size: 12 }
            },
            grid: {
              color: gridColor,
              drawBorder: false
            }
          },
          x: {
            ticks: {
              color: textColor,
              font: { size: 12 }
            },
            grid: {
              color: gridColor,
              drawBorder: false
            }
          }
        }
      }
    });
  }

  // 필터 버튼 이벤트
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentRange = parseInt(this.dataset.range);
      renderMonthlyChart(allData.byMonth, currentRange);
    });
  });

  function formatMonth(monthStr) {
    const [year, month] = monthStr.split('-');
    const date = new Date(year, parseInt(month) - 1);
    return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'short' });
  }

  function capitalize(str) {
    return str
      .split('-')
      .map(word => word.charAt(0).toUpperCase() + word.slice(1))
      .join(' ');
  }

  // 다크모드 변경 시 차트 다시 렌더링
  const observer = new MutationObserver(function() {
    if (allData) {
      renderMonthlyChart(allData.byMonth, currentRange);
    }
  });

  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
</script>
