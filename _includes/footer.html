<footer class="footer">
<div id="topWidget" class="top-widget">
  <!-- 공유 패널: 공유 버튼 클릭 시 좌측으로 펼쳐짐 -->
  <div class="top-widget__share-panel" id="sharePanel">
    <!-- 링크 복사 -->
    <button type="button" class="top-widget__share-item" id="shareCopy" aria-label="링크 복사">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <!-- Facebook -->
    <a class="top-widget__share-item" id="shareFacebook" href="#"
       target="_blank" rel="noopener noreferrer" aria-label="Facebook으로 공유">
      <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
        <path fill="currentColor"
              d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
    </a>
    <!-- X / Twitter -->
    <a class="top-widget__share-item" id="shareTwitter" href="#"
       target="_blank" rel="noopener noreferrer" aria-label="X로 공유">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path fill="currentColor"
              d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
    <!-- LinkedIn -->
    <a class="top-widget__share-item" id="shareLinkedIn" href="#"
       target="_blank" rel="noopener noreferrer" aria-label="LinkedIn으로 공유">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
    </a>
  </div>

  <!-- 공유 토글 -->
  <button type="button" class="top-widget__action" id="shareBtn"
          aria-label="공유하기" aria-expanded="false">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true" focusable="false">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
  </button>

  <!-- TOP 버튼 (공유 버튼과 동일 행) -->
  <button type="button" onclick="topFunction()" id="topBtn"
          class="top-widget__top" aria-label="맨 위로 이동">
    <svg class="top-widget__arrow" viewBox="0 0 24 24" width="20" height="20"
         aria-hidden="true" focusable="false">
      <path fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"
            d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>
</div>
<div>
    <div class="newsletter-subscribe">
      <hr class="newsletter-subscribe__divider">
      <div class="newsletter-subscribe__card">
        <div class="newsletter-subscribe__header">
          <svg class="newsletter-subscribe__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <div>
            <p class="newsletter-subscribe__title">새 글 알림 받기</p>
            <p class="newsletter-subscribe__desc">새 글이 발행되면 이메일로 알려드립니다.</p>
          </div>
        </div>
        <form
          class="newsletter-subscribe__form"
          action="https://fea5a0fa.sibforms.com/serve/MUIFAKShPiXOd-2qMOmKYUDkRvIQzVwvyuALYorxBPUFz_-JYj0IkB61_rLgpBrMGH8GfmEtvGeVCCBba5eL-EDcMddYunOERM2ydRYGqWRyddyMMHzvDapqB9iTPVb03ToScmYQBNcYeZT5i8GBIkEQCQEqsgCBmr2Ch4mbr7-o8Q-bomHcyXrSOZZiIWG9v2p6K2dEnjCvuERcgA=="
          method="post"
          novalidate
        >
          <div class="newsletter-subscribe__input-row" id="newsletter-input-row">
            <input type="email" name="EMAIL" id="newsletter-email" placeholder="이메일" aria-label="이메일 주소" aria-describedby="newsletter-email-error" oninput="document.querySelector('.newsletter-subscribe__form button[type=submit]').disabled=(!this.value.trim()||!this.checkValidity()||!document.getElementById('newsletter-consent').checked)" />
            <button type="submit" disabled>구독하기</button>
          </div>
          <p class="newsletter-subscribe__error" id="newsletter-email-error" aria-live="polite" role="alert"></p>
          <label class="newsletter-subscribe__consent">
            <input type="checkbox" id="newsletter-consent" onchange="var e=document.getElementById('newsletter-email');document.querySelector('.newsletter-subscribe__form button[type=submit]').disabled=(!this.checked||!e.value.trim()||!e.checkValidity())" />
            <span>(필수) 뉴스레터 수신을 위한 개인정보 수집 및 이용에 동의합니다.</span>
          </label>
          <input type="text" name="email_address_check" value="" style="display:none">
          <input type="hidden" name="locale" value="en">
        </form>
      </div>
    </div>
    <div class="social-media-links">
        <a href="mailto:dgnppr@gmail.com" target="_blank"><i class="fas fa-envelope"></i></a>
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/dgnppr" target="_blank"><i class="fab fa-github"></i></a>

        <a href="/feed.xml" target="_blank"><i class="fas fa-rss"></i></a>
    </div>
    {% if page.latex %}
        <script type="text/x-mathjax-config">
          MathJax.Hub.Config({
            tex2jax: {
              inlineMath: [['$', '$'], ['\\(', '\\)']],
              processEscapes: true
            }
          });
        </script>
        <script type="text/javascript" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.2/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    {% endif %}
    <script src="/js/autolink.js"></script>
    <script src="/js/code-copy.js"></script>
</div>
<script src="/js/lightbox.js"></script>
<script>
  document.querySelector('.newsletter-subscribe__form').addEventListener('submit', function(e) {
    var input = document.getElementById('newsletter-email');
    var error = document.getElementById('newsletter-email-error');
    var val = input.value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      e.preventDefault();
      error.textContent = '올바른 이메일 형식이 아닙니다.';
      input.classList.add('is-error');
      input.focus();
      return;
    }
    error.textContent = '';
    input.classList.remove('is-error');
  });
  document.getElementById('newsletter-email').addEventListener('input', function() {
    this.classList.remove('is-error');
    document.getElementById('newsletter-email-error').textContent = '';
  });

  if (new URLSearchParams(location.search).get('subscribed') === 'true') {
    var toast = document.createElement('div');
    toast.textContent = '구독이 완료되었습니다.';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4a9eff;color:#fff;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:500;letter-spacing:0.01em;z-index:9999;opacity:1;transition:opacity 0.5s;box-shadow:0 4px 12px rgba(74,158,255,0.3)';
    document.body.appendChild(toast);
    history.replaceState(null, '', location.pathname);
    setTimeout(function() { toast.style.opacity = '0'; setTimeout(function() { toast.remove(); }, 500); }, 3000);
  }
</script>
<script src="/js/heading-anchor.js"></script>
<script src="/js/code-enhance.js"></script>
</footer>
