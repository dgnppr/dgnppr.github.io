{% comment %} 지식 그래프 제목·태그 검색 인풋 — include.id 필수, include.size="sm" 선택 {% endcomment %}
<div class="kg-search{% if include.size == 'sm' %} kg-search--sm{% endif %}">
    <svg class="kg-search__icon" viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.2" y1="10.2" x2="14" y2="14"/>
    </svg>
    <input id="{{ include.id }}" class="kg-search__input" type="text" placeholder="제목 · 태그 검색" autocomplete="off" spellcheck="false" aria-label="지식 그래프 제목·태그 검색">
</div>
