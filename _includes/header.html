<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.summary }}">
    <meta name="theme-color" content="#ffffff">
    <script>
        (function () {
            var s = localStorage.getItem('theme');
            var dark = s !== null ? s === 'dark-mode' : matchMedia('(prefers-color-scheme: dark)').matches;
            if (dark) document.documentElement.classList.add('dark-mode');
        })();
    </script>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend:
        site.baseurl | prepend: site.url }}" />

    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:image" content="{{ site.url }}/resource/image.png">
    <meta property="og:description" content="{{ site.summary }}">
    <meta property="og:locale" content="ko_KR" />

    <link rel="apple-touch-icon" sizes="57x57" href="/resource/icon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/resource/icon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/resource/icon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/resource/icon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/resource/icon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/resource/icon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/resource/icon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/resource/icon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/resource/icon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/resource/icon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/resource/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/resource/icon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/resource/icon/favicon-16x16.png">
    <link rel="manifest" href="/resource/icon/manifest.json">

    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/resource/icon/ms-icon-144x144.png">

    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    {% if site.google_analytics.id %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics.id }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics.id }}');
    </script>
    {% endif %}

    {% include json-ld.html %}
    <style>
        .header-search-toggle {
            transition: color 0.2s;
        }

        .header-icon-unified {
            font-size: 1.1em;
        }

        .header-search-toggle[aria-label="통계"] .header-icon-unified {
            font-size: 1.25em;
            font-weight: 300;
        }
    </style>
</head>
<header class="header">
    <div class="header-left">
        <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>
    </div>
    <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">
            <span class="toggle-track">
                <span class="toggle-thumb"></span>
            </span>
        </button>
        <button id="search-toggle" class="header-search-toggle" aria-label="검색">
            <i class="fas fa-search"></i>
        </button>
    </div>
</header>
<div id="searchbox-wrapper" class="searchbox-wrapper" aria-hidden="true">
    {% include searchbox.html %}
</div>
<script src="/js/top.js"></script>
<script src="/js/theme-toggle.js"></script>
<script>
(function () {
    var toggle = document.getElementById('search-toggle');
    var wrapper = document.getElementById('searchbox-wrapper');
    var fuseInstance = null;
    var allItems = null;

    var QUICK_ACTIONS = [
        {
            label: '전체보기',
            url: '/topics/',
            icon: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>'
        },
        {
            label: '태그',
            url: '/tags/',
            icon: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>'
        },
        {
            label: '지식 그래프',
            url: '#',
            modal: true,
            icon: '<i class="fas fa-brain" aria-hidden="true"></i>'
        },
        {
            label: '통계',
            url: '/writing-stats/',
            icon: '<i class="fas fa-chart-bar" aria-hidden="true"></i>'
        },
    ];

    function showQuickActions() {
        var results = document.getElementById('search-results');
        if (!results) return;
        results.innerHTML =
            '<div class="search-quick-label">바로가기</div>' +
            QUICK_ACTIONS.map(function(a) {
                var extra = a.modal ? ' data-kg-open' : '';
                return '<a class="search-result-item" href="' + a.url + '"' + extra + '>' +
                    '<span class="search-quick-icon">' + a.icon + '</span>' +
                    '<span class="search-result-main">' +
                    '<span class="search-result-title">' + a.label + '</span>' +
                    '</span>' +
                    '</a>';
            }).join('');
        results.classList.add('is-open');
    }

    function openSearch() {
        wrapper.classList.add('is-open');
        wrapper.setAttribute('aria-hidden', 'false');
        wrapper.querySelector('.searchInput').focus();
        showQuickActions();
    }

    function closeSearch() {
        wrapper.classList.remove('is-open');
        wrapper.setAttribute('aria-hidden', 'true');
        var results = document.getElementById('search-results');
        if (results) { results.classList.remove('is-open'); results.innerHTML = ''; }
        var input = document.getElementById('local-search-input');
        if (input) { input.value = ''; }
    }

    toggle.addEventListener('click', function () {
        wrapper.classList.contains('is-open') ? closeSearch() : openSearch();
    });

    var closeBtn = document.getElementById('search-close');
    if (closeBtn) { closeBtn.addEventListener('click', closeSearch); }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeSearch(); }
    });

    wrapper.addEventListener('click', function (e) {
        if (e.target.closest('[data-kg-open]')) { closeSearch(); return; }
        var card = wrapper.querySelector('.search');
        if (card && !card.contains(e.target)) { closeSearch(); }
    });

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function hlText(text, indices) {
        if (!indices || !indices.length) return escHtml(text);
        var r = '', last = 0;
        indices.forEach(function(p) {
            r += escHtml(text.slice(last, p[0]));
            r += '<mark class="search-highlight">' + escHtml(text.slice(p[0], p[1] + 1)) + '</mark>';
            last = p[1] + 1;
        });
        return r + escHtml(text.slice(last));
    }

    function loadIndex(callback) {
        if (fuseInstance) { callback(); return; }
        fetch('/data/search-index.json')
            .then(function (r) { return r.json(); })
            .then(function (data) {
                allItems = data.filter(function (item) {
                    if (item.type === 'tag') { return false; }
                    if (item.type === 'wiki' && /^\/wiki\/[^/]+$/.test(item.url)) { return false; }
                    return true;
                });
                fuseInstance = new Fuse(allItems, {
                    keys: [
                        { name: 'title', weight: 2 },
                        { name: 'tags', weight: 1.5 },
                        { name: 'summary', weight: 1 },
                        { name: 'snippet', weight: 0.5 }
                    ],
                    threshold: 0.35,
                    minMatchCharLength: 2,
                    includeMatches: true
                });
                callback();
            })
            .catch(function () { fuseInstance = new Fuse([]); });
    }

    function getDisplayType(item) {
        if (item.type === 'wiki' && /^\/wiki\/[^/]+$/.test(item.url)) { return 'index'; }
        return item.type;
    }

    function renderResults(matches) {
        var results = document.getElementById('search-results');
        if (!matches.length) {
            results.innerHTML = '<div class="search-no-result">결과 없음</div>';
        } else {
            results.innerHTML = matches.map(function (item) {
                var displayType = getDisplayType(item);
                var typeBadge = displayType
                    ? '<span class="search-result-type type-' + displayType + '">' + displayType + '</span>'
                    : '';
                var snippetHtml = '';
                if (item.snippet) {
                    var snip = item.snippet.slice(0, 120);
                    snippetHtml = '<span class="search-result-snippet">' + hlText(snip, item._si) + '...</span>';
                }
                var tagsHtml = '';
                if (item.tags && item.tags.length) {
                    tagsHtml = '<span class="search-result-tags">' +
                        item.tags.map(function (t) { return '<span class="search-result-tag">#' + hlText(t, item._tm && item._tm[t]) + '</span>'; }).join('') +
                        '</span>';
                }
                return '<a class="search-result-item" href="' + item.url + '">' +
                    typeBadge +
                    '<span class="search-result-main">' +
                    '<span class="search-result-title">' + hlText(item.title, item._ti) + '</span>' +
                    snippetHtml +
                    tagsHtml +
                    '</span>' +
                    '</a>';
            }).join('');
        }
        results.classList.add('is-open');
    }

    document.addEventListener('input', function (e) {
        if (e.target.id !== 'local-search-input') { return; }
        var raw = e.target.value.trim();
        var results = document.getElementById('search-results');
        if (!raw) { showQuickActions(); return; }
        loadIndex(function () {
            var q = raw.toLowerCase();
            var matches;
            if (q.charAt(0) === '#') {
                // 태그 검색: # 이후 문자열과 태그가 일치하는 항목
                var tag = q.slice(1);
                matches = tag
                    ? allItems.filter(function (item) {
                        return item.tags && item.tags.some(function (t) {
                            return t.toLowerCase().indexOf(tag) !== -1;
                        });
                    }).slice(0, 10)
                    : [];
            } else {
                // 제목/태그/요약 퍼지 검색 (Fuse.js)
                var fuseRes = fuseInstance.search(raw, { limit: 10 });
                matches = fuseRes.map(function (r) {
                    var ti = null, tm = {}, si = null;
                    if (r.matches) r.matches.forEach(function (m) {
                        if (m.key === 'title') ti = m.indices;
                        if (m.key === 'tags') tm[m.value] = m.indices;
                        if (m.key === 'snippet') si = m.indices;
                    });
                    return Object.assign({}, r.item, { _ti: ti, _tm: tm, _si: si });
                });
            }
            renderResults(matches);
        });
    });

    document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            wrapper.classList.contains('is-open') ? closeSearch() : openSearch();
            return;
        }
        if (e.key === '/' &&
            document.activeElement.tagName !== 'INPUT' &&
            document.activeElement.tagName !== 'TEXTAREA' &&
            document.activeElement.tagName !== 'SELECT' &&
            !document.activeElement.isContentEditable) {
            e.preventDefault();
            openSearch();
        }
    });
})();
</script>
