---
layout: default
title: 온톨로지 헬스
permalink: /health/
sitemap: false
---

<meta name="robots" content="noindex, nofollow">

<style>
  .health { max-width: 760px; margin: 48px auto 80px; padding: 0 20px; }
  .health h1 { font-size: 1.6rem; margin: 0 0 4px; }
  .health__meta { color: var(--color-text-tertiary); font-size: 0.85rem; margin: 0 0 28px; }
  .health h2 { font-size: 1rem; margin: 26px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--color-border-subtle); }
  .health ul { margin: 0; padding-left: 18px; }
  .health li { font-size: 0.88rem; line-height: 1.7; }
  .health__none { color: var(--color-text-tertiary); font-size: 0.88rem; }
  .health__dead { color: var(--color-text-secondary); font-size: 0.84rem; line-height: 1.7; }
</style>

<div class="health">
  <h1>온톨로지 헬스</h1>
  <p class="health__meta" id="health-meta"></p>
  <div id="health-root"></div>
</div>

<script>
(function () {
  var TYPE_URL_PREFIX = { concept:'/concept/', insight:'/insight/', problem:'/problem/', tool:'/tool/', event:'/event/', adr:'/adr/' };
  function urlOf(n){ return n.url || (TYPE_URL_PREFIX[n.type] || '/concept/') + n.id.replace(/^[^\/]+\//,'') + '/'; }
  function esc(s){ var d=document.createElement('div'); d.textContent=(s==null)?'':String(s); return d.innerHTML; }
  function stripPrefix(id){ return String(id).replace(/^[^\/]+\//,''); }

  fetch('/data/ontology-graph.json').then(function(r){return r.ok?r.json():null;}).then(function(graph){
    var root = document.getElementById('health-root');
    if (!graph || !graph.nodes) { root.textContent = '그래프 데이터를 불러오지 못했습니다.'; return; }
    var nodes = graph.nodes, edges = graph.edges || [];
    var ids = Object.keys(nodes);

    var degree = {}, nodeSet = {};
    ids.forEach(function(id){ degree[id] = 0; nodeSet[id] = true; });
    var deadLinks = [];
    edges.forEach(function(e){
      if (nodeSet[e.from]) degree[e.from]++;
      if (nodeSet[e.to]) degree[e.to]++;
      if (!nodeSet[e.to]) deadLinks.push(e);
    });

    var orphans = ids.filter(function(id){ return degree[id] === 0; }).map(function(id){ return nodes[id]; });
    var shallow = ids.filter(function(id){ var d = nodes[id].content_depth; return typeof d === 'number' && d < 0.4; }).map(function(id){ return nodes[id]; });

    var catCount = {};
    ids.forEach(function(id){
      var parts = id.split('/');
      if (parts.length < 3) return;
      catCount[parts[0] + '/' + parts[1]] = (catCount[parts[0] + '/' + parts[1]] || 0) + 1;
    });
    var thinCats = Object.keys(catCount).filter(function(k){ return catCount[k] < 2; });

    document.getElementById('health-meta').textContent = '전체 ' + ids.length + '개 · 연결 ' + edges.length + '개';

    function nodeList(list){
      if (!list.length) return '<p class="health__none">없음</p>';
      return '<ul>' + list.map(function(n){ return '<li><a href="' + urlOf(n) + '">' + esc(n.title || n.id) + '</a></li>'; }).join('') + '</ul>';
    }
    function sec(title, count, body){ return '<h2>' + title + ' (' + count + ')</h2>' + body; }

    root.innerHTML =
      sec('고아 노드', orphans.length, nodeList(orphans)) +
      sec('얕은 문서', shallow.length, nodeList(shallow)) +
      sec('데드링크', deadLinks.length, deadLinks.length
        ? deadLinks.map(function(d){ return '<div class="health__dead">' + esc(stripPrefix(d.from)) + ' → ' + esc(d.to) + '</div>'; }).join('')
        : '<p class="health__none">없음</p>') +
      sec('빈약 카테고리', thinCats.length, thinCats.length
        ? '<ul>' + thinCats.map(function(k){ return '<li>' + esc(k) + ' (' + catCount[k] + ')</li>'; }).join('') + '</ul>'
        : '<p class="health__none">없음</p>');
  }).catch(function(){
    document.getElementById('health-root').textContent = '불러오기 실패.';
  });
})();
</script>
