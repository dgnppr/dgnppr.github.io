---
layout: default
title: Tags
permalink: /tags/
public: true
---
<div class="post">
    <h1 class="tag-page-title">All Tags</h1>
    <div id="tag-list"></div>
</div>

<div class="post" id="tag-collection"></div>

<script>
    var activeTagName = null;

    (function() {
        fetch('/data/tag_count.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data == null) return;

                // 알파벳 첫 글자별 그루핑
                var groups = {};
                for (var i = 0; i < data.length; i++) {
                    var letter = data[i].name[0].toUpperCase();
                    if (!groups[letter]) groups[letter] = [];
                    groups[letter].push(data[i]);
                }

                var template = '';
                Object.keys(groups).sort().forEach(function(letter) {
                    template += '<div class="tag-alpha-group">' +
                        '<span class="tag-alpha-label">' + letter + '</span>' +
                        '<ul class="tag-cloud">';
                    groups[letter].forEach(function(tag) {
                        template += '<li class="tag-item" id="tag-pill-' + tag.name + '">' +
                            '<a href="#' + tag.name + '" onclick="showTag(\'' + tag.name + '\')">' +
                            tag.name + '<span class="tag-count">' + tag.size + '</span>' +
                            '</a></li>';
                    });
                    template += '</ul></div>';
                });
                document.getElementById('tag-list').innerHTML = template;
                showInitTag();
            })
            .catch(console.error);
    })();

    function showTag(tagName) {
        if (activeTagName) {
            var prev = document.getElementById('tag-pill-' + activeTagName);
            if (prev) prev.classList.remove('active');
        }
        activeTagName = tagName;
        var current = document.getElementById('tag-pill-' + tagName);
        if (current) current.classList.add('active');

        fetch('/data/tags/' + tagName + '.json')
            .then(function(r) { return r.json(); })
            .then(function(data) { createLinks(data, tagName); })
            .catch(console.error);
    }

    function createLinks(data, tagName) {
        if (data == null) return;

        var listItems = '';
        for (var i = 0; i < data.length; i++) {
            listItems += '<li id="' + getDocumentElementId(tagName, data[i]) + '" class="post-item"></li>';
        }
        document.getElementById('tag-collection').innerHTML =
            '<div class="tag-section"><h3>' + tagName + '</h3>' +
            '<ul class="post-list">' + listItems + '</ul></div>';

        for (var i = 0; i < data.length; i++) {
            (function(docId) {
                setTimeout(function() { insertDocumentLink(docId, tagName); }, 0);
            })(data[i]);
        }
    }

    function insertDocumentLink(documentId, tagName) {
        fetch('/data/metadata/' + documentId + '.json')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d == null) return;

                var updatedDate = d.updated.replace(/^(\d{4}-\d{2}-\d{2}).*$/, '$1');
                var excerpt = (d.summary == null || /^\s*$/.test(d.summary))
                    ? ''
                    : '<div class="post-excerpt">' + d.summary + '</div>';
                var sub = (d.children && d.children.length > 0)
                    ? '<div class="post-sub-document">서브 문서 ' + d.children.length + '개</div>'
                    : '';

                var link =
                    '<a class="post-link" href="' + d.url + '">' +
                        '<div class="post-header">' +
                            '<span class="post-title">' + d.title + '</span>' +
                            '<span class="post-date" title="' + d.updated + '">' + updatedDate + '</span>' +
                        '</div>' +
                        excerpt + sub +
                    '</a>';

                document.getElementById(getDocumentElementId(tagName, documentId)).innerHTML = link;
            })
            .catch(console.error);
    }

    function getDocumentElementId(tagName, documentId) {
        return 'tag-' + tagName + '-' + documentId;
    }

    function showInitTag() {
        var req = /#([^\s]+)$/.exec(window.location.href);
        if (Array.isArray(req)) {
            showTag(decodeURI(req.pop()));
        }
    }
</script>
