<div class="hub-page">
  <h1 class="hub-title">Topics</h1>
  <p class="hub-desc">카테고리별 기술 문서 목록</p>
  <div id="hub-grid" class="hub-grid">
    <p class="hub-loading">로딩 중...</p>
  </div>
</div>
<script>
(function() {
    fetch('/data/hub.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('hub-grid');
            var cats = Object.keys(data).sort();
            if (!cats.length) { grid.innerHTML = '<p>문서가 없습니다.</p>'; return; }
            grid.innerHTML = cats.map(function(cat) {
                var c = data[cat];
                var label = cat.replace(/-/g, ' ');
                return '<section class="hub-cat">' +
                    '<h2 class="hub-cat__name">' + label + ' <span class="hub-cat__count">(' + c.docs.length + ')</span></h2>' +
                    '<ul class="hub-cat__list">' +
                    c.docs.map(function(d) {
                        return '<li><a class="hub-doc-link" href="' + d.url + '">' + d.title + '</a>' +
                            (d.summary ? '<span class="hub-doc-summary">' + d.summary + '</span>' : '') + '</li>';
                    }).join('') + '</ul></section>';
            }).join('');
        })
        .catch(function() {
            document.getElementById('hub-grid').innerHTML = '<p>데이터를 불러올 수 없습니다.</p>';
        });
})();
</script>
