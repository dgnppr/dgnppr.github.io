---
layout: default
title: Topics
permalink: /topics/
---
<div class="hub-page">
  <h1 class="hub-title">Topics</h1>
  <div id="hub-grid">
    <p class="hub-loading">로딩 중...</p>
  </div>
</div>
<script>
var ENTITY_TYPES = ['insight', 'problem', 'tool', 'event', 'adr'];

(function() {
    fetch('/data/hub.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('hub-grid');
            var keys = Object.keys(data);
            if (!keys.length) { grid.innerHTML = '<p>문서가 없습니다.</p>'; return; }

            // 타입별 분류
            var entityKeys = ENTITY_TYPES.filter(function(t) { return data[t]; });
            var wikiKeys = keys.filter(function(k) { return !ENTITY_TYPES.includes(k); }).sort();

            function docList(docs) {
                return '<ul class="topic-doc-list">' +
                    docs.map(function(d) {
                        return '<li><a class="hub-doc-link" href="' + d.url + '">' + d.title + '</a></li>';
                    }).join('') + '</ul>';
            }

            function section(typeClass, label, bodyHtml, totalCount) {
                return '<section class="topic-section">' +
                    '<div class="topic-section__header">' +
                    '<span class="topic-section__name">' + label + '</span>' +
                    '<span class="topic-section__count">' + totalCount + '</span>' +
                    '</div>' +
                    '<div class="topic-section__body">' + bodyHtml + '</div>' +
                    '</section>';
            }

            // wiki: 서브카테고리별로 묶어서 하나의 섹션
            var wikiTotal = wikiKeys.reduce(function(s, k) { return s + data[k].docs.length; }, 0);
            var wikiBody = wikiKeys.map(function(cat) {
                var c = data[cat];
                return '<div class="topic-subcat">' +
                    '<span class="topic-subcat__name">' + cat.replace(/-/g, ' ') + '</span>' +
                    '<span class="topic-subcat__count">' + c.docs.length + '</span>' +
                    '</div>' + docList(c.docs);
            }).join('');

            // entity types: 각각 독립 섹션
            var entityHtml = entityKeys.map(function(cat) {
                var c = data[cat];
                return section(cat, cat, docList(c.docs), c.docs.length);
            }).join('');

            grid.innerHTML =
                (wikiKeys.length ? section('wiki', 'wiki', wikiBody, wikiTotal) : '') +
                entityHtml;
        })
        .catch(function() {
            document.getElementById('hub-grid').innerHTML = '<p>데이터를 불러올 수 없습니다.</p>';
        });
})();
</script>
